<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" type="txt/css" media="screen" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content center">

            <form id="formLog">
                <div class="mb-3">
                    <label for="logEmail" class="form-label">E-mail</label>
                    <input placeholder="E-mail" type="logEmail" class="form-control" id="logEmail" aria-describedby="emailHelp">
                    <div id="emailHelp" class="form-text">Não compartilhe seu E-mail.</div>
                </div>
                <div class="mb-3">
                    <label for="logPass" class="form-label">Senha</label>
                    <input placeholder="Senha" type="logPass" class="form-control" id="logPass">
                </div>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                <div class="mb-3 form-check">
                    <p class="text-muted small">já possui uma conta? <a href="cadastro.html">cadastrar</a></p>
                </div>
            </form>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
