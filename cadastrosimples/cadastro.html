<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" type="txt/css" media="screen" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content center">

            <form id="formCad">
                <div class="mb-3">
                    <label for="cadNome" class="form-label">Nome de usuário</label>
                    <input placeholder="exemplo: Raoni" type="text" class="form-control" id="cadNome" aria-describedby="emailHelp" required>
                    <div id="emailHelp" class="form-text">Não compartilhe seu E-mail.</div>
                </div>
                <div class="mb-3">
                    <label for="cadEmail" class="form-label">E-mail</label>
                    <input placeholder="exemplo: example@gmail.com" type="email" class="form-control" id="cadEmail" aria-describedby="emailHelp" required>
                    <div id="emailHelp" class="form-text"></div>
                </div>
                <div class="mb-3">
                    <label for="cadPass" class="form-label">Confirmar Senha</label>
                    <input placeholder="senha" type="password" class="form-control" id="cadPass" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
                <div class="mb-3 form-check">
                    <p class="text-muted small">já possui uma conta? <a href="index.html">entrar</a></p>
                </div>
            </form>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
