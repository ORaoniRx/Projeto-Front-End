<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema Mock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5">
                <div class="card shadow-lg border-0">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Criar Conta</h2>
                        
                        <form id="cadForm">
                            <div class="mb-3">
                                <label for="cadNome" class="form-label">Nome Completo</label>
                                <input type="text" id="cadNome" class="form-control" placeholder="Ex: João Silva" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="cadEmail" class="form-label">E-mail</label>
                                <input type="email" id="cadEmail" class="form-control" placeholder="nome@exemplo.com" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="cadSenha" class="form-label">Senha</label>
                                <input type="password" id="cadSenha" class="form-control" placeholder="Mínimo 6 caracteres" required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 mt-3">Finalizar Cadastro</button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted small">Já possui uma conta? <a href="index.html" class="text-decoration-none">Faça Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
